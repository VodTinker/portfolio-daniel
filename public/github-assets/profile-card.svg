<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="cardG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B8AAC"/>
      <stop offset="50%" stop-color="#E8B4C8"/>
      <stop offset="100%" stop-color="#7BA3C9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="avatarClip">
      <circle cx="50" cy="50" r="45"/>
    </clipPath>
  </defs>

  <style>
    .title { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 22px; fill: #E8B4C8; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: #9B8AAC; }
    .label { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #6e7681; }
    .value { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #c9d1d9; }
    .section-title { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; fill: #E8B4C8; }
    .fact-label { font-family: 'Inter', sans-serif; font-size: 11px; fill: #9B8AAC; }
    .fact-value { font-family: 'Inter', sans-serif; font-size: 11px; fill: #c9d1d9; }
    .highlight { fill: #7BA3C9; }
    .sep { stroke: #30363d; stroke-width: 1; }
  </style>

  <rect x="0" y="0" width="800" height="280" rx="12" fill="url(#cardG)"/>
  <rect x="1" y="1" width="798" height="278" rx="12" fill="none" stroke="url(#accentG)" stroke-width="1.5" opacity="0.5"/>

  <g transform="translate(30, 28)">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#9B8AAC" stroke-width="1" opacity="0.15"/>
    <circle cx="50" cy="50" r="45" fill="#2D1B4E"/>
    <image
      href="1.sakura_a%20%28copia%201%29.jpg"
      x="5"
      y="5"
      width="90"
      height="90"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#avatarClip)"
    />
    <circle cx="50" cy="50" r="45" fill="none" stroke="#9B8AAC" stroke-width="2"/>
    <circle cx="85" cy="85" r="4" fill="#3FB950" filter="url(#glow)"/>
  </g>

  <g transform="translate(140, 45)">
    <text class="title" x="0" y="0">Daniel Fonov</text>
    <text class="subtitle" x="0" y="22">Student &amp; Aspiring SysAdmin</text>
    <text class="label" x="0" y="42">📍 Gijón, Asturias 🇪🇸</text>
  </g>

  <line class="sep" x1="30" y1="130" x2="380" y2="130"/>
  <line class="sep" x1="400" y1="30" x2="400" y2="250"/>

  <g transform="translate(30, 150)">
    <text class="section-title" x="0" y="0">🔧 Currently</text>
    <g transform="translate(0, 22)">
      <text class="value" x="0" y="0">→ Building home lab infrastructure</text>
      <text class="value" x="0" y="20">→ Learning networking &amp; VPN configs</text>
      <text class="value" x="0" y="40">→ Working towards learning web development</text>
    </g>
  </g>

  <g transform="translate(420, 40)">
    <text class="section-title" x="0" y="0">⚡ Quick Facts</text>
  </g>
  <g transform="translate(420, 68)">
    <g>
      <text class="fact-label" x="0" y="0">🐧 Daily Driver</text>
      <text class="fact-value highlight" x="120" y="0">Arch Linux</text>
    </g>
    <g transform="translate(0, 28)">
      <text class="fact-label" x="0" y="0">🏠 Home Lab</text>
      <text class="fact-value" x="120" y="0">Proxmox Cluster</text>
    </g>
    <g transform="translate(0, 56)">
      <text class="fact-label" x="0" y="0">☁️ Cloud</text>
      <text class="fact-value" x="120" y="0">Cloudflare · DigitalOcean</text>
    </g>
    <g transform="translate(0, 84)">
      <text class="fact-label" x="0" y="0">🔐 Security</text>
      <text class="fact-value" x="120" y="0">WireGuard · Firewalls</text>
    </g>
    <g transform="translate(0, 112)">
      <text class="fact-label" x="0" y="0">🎮 Gaming</text>
      <text class="fact-value" x="120" y="0">Hollow Knight: Silksong</text>
    </g>
  </g>

  <g transform="translate(420, 240)">
    <g>
      <rect x="0" y="0" width="45" height="18" rx="3" fill="#1793D1" opacity="0.2"/>
      <text x="22.5" y="12" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#1793D1">Arch</text>
    </g>
    <g transform="translate(50, 0)">
      <rect x="0" y="0" width="45" height="18" rx="3" fill="#3776AB" opacity="0.2"/>
      <text x="22.5" y="12" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#3776AB">Python</text>
    </g>
    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="45" height="18" rx="3" fill="#2496ED" opacity="0.2"/>
      <text x="22.5" y="12" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#2496ED">Docker</text>
    </g>
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="60" height="18" rx="3" fill="#3178C6" opacity="0.2"/>
      <text x="30" y="12" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#3178C6">TypeScript</text>
    </g>
    <g transform="translate(215, 0)">
      <rect x="0" y="0" width="45" height="18" rx="3" fill="#ff5d01" opacity="0.2"/>
      <text x="22.5" y="12" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#ff5d01">Astro</text>
    </g>
    <g transform="translate(265, 0)">
      <rect x="0" y="0" width="45" height="18" rx="3" fill="#61dafb" opacity="0.2"/>
      <text x="22.5" y="12" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#61dafb">React</text>
    </g>
    <g transform="translate(315, 0)">
      <rect x="0" y="0" width="45" height="18" rx="3" fill="#dea584" opacity="0.2"/>
      <text x="22.5" y="12" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#dea584">Rust</text>
    </g>
  </g>

  <path d="M15 265 L15 270 L20 270" stroke="#9B8AAC" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M785 265 L785 270 L780 270" stroke="#9B8AAC" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M15 15 L15 10 L20 10" stroke="#9B8AAC" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M785 15 L785 10 L780 10" stroke="#9B8AAC" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
