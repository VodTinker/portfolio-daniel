<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120" preserveAspectRatio="none">
  <defs>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D1B4E">
        <animate attributeName="stop-color" values="#2D1B4E;#3a2562;#2D1B4E" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#9B8AAC">
        <animate attributeName="stop-color" values="#9B8AAC;#b7a3cc;#9B8AAC" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7BA3C9">
        <animate attributeName="stop-color" values="#7BA3C9;#8ec0e4;#7BA3C9" dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B8AAC">
        <animate attributeName="stop-color" values="#9B8AAC;#b39cc4;#9B8AAC" dur="22s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#E8B4C8">
        <animate attributeName="stop-color" values="#E8B4C8;#f0c9d8;#E8B4C8" dur="22s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#2D1B4E">
        <animate attributeName="stop-color" values="#2D1B4E;#412872;#2D1B4E" dur="22s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="wg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7BA3C9"/>
      <stop offset="50%" stop-color="#2D1B4E"/>
      <stop offset="100%" stop-color="#E8B4C8"/>
    </linearGradient>

    <path id="crestPath" d="M0,58 C100,38 200,78 300,58 C400,38 500,78 600,58 C700,38 800,58 800,58"/>
  </defs>

  <style>
    .foam {
      fill: #ffffff;
      animation: foamPulse 3s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes foamPulse {
      0%, 100% { opacity: 0;   transform: scale(0.8); }
      50%      { opacity: 0.6; transform: scale(1.2); }
    }
    .sparkle { fill: #ffffff; }
    @media (prefers-reduced-motion: reduce) {
      animate, animateMotion { display: none; }
      .foam, .sparkle { animation: none; opacity: 0 !important; }
    }
  </style>

  <path fill="url(#wg1)" opacity="0.6">
    <animate attributeName="d" dur="8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
      keyTimes="0; 0.5; 1"
      values="M0,60 C100,40 200,80 300,60 C400,40 500,80 600,60 C700,40 800,60 800,60 L800,120 L0,120 Z;M0,55 C100,75 200,45 300,65 C400,85 500,50 600,70 C700,45 800,65 800,65 L800,120 L0,120 Z;M0,60 C100,40 200,80 300,60 C400,40 500,80 600,60 C700,40 800,60 800,60 L800,120 L0,120 Z"/>
  </path>

  <path fill="url(#wg2)" opacity="0.5">
    <animate attributeName="d" dur="6s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
      keyTimes="0; 0.5; 1"
      values="M0,70 C80,50 160,90 240,70 C320,50 400,90 480,70 C560,50 640,90 720,70 C800,50 800,70 800,70 L800,120 L0,120 Z;M0,75 C80,95 160,55 240,75 C320,95 400,55 480,75 C560,95 640,55 720,75 C800,95 800,75 800,75 L800,120 L0,120 Z;M0,70 C80,50 160,90 240,70 C320,50 400,90 480,70 C560,50 640,90 720,70 C800,50 800,70 800,70 L800,120 L0,120 Z"/>
  </path>

  <path fill="url(#wg3)" opacity="0.7">
    <animate attributeName="d" dur="10s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
      keyTimes="0; 0.5; 1"
      values="M0,80 C120,65 240,95 360,80 C480,65 600,95 720,80 C840,65 800,80 800,80 L800,120 L0,120 Z;M0,85 C120,100 240,70 360,85 C480,100 600,70 720,85 C840,100 800,85 800,85 L800,120 L0,120 Z;M0,80 C120,65 240,95 360,80 C480,65 600,95 720,80 C840,65 800,80 800,80 L800,120 L0,120 Z"/>
  </path>

  <circle class="foam" cx="150" cy="58" r="2"   style="animation-delay: 0s"/>
  <circle class="foam" cx="320" cy="68" r="2.5" style="animation-delay: 0.6s"/>
  <circle class="foam" cx="520" cy="58" r="2"   style="animation-delay: 1.2s"/>
  <circle class="foam" cx="680" cy="68" r="2.5" style="animation-delay: 1.8s"/>

  <circle class="sparkle" r="1.8">
    <animateMotion dur="7s" repeatCount="indefinite" begin="0s"><mpath href="#crestPath"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle class="sparkle" r="1.5">
    <animateMotion dur="9s" repeatCount="indefinite" begin="-3s"><mpath href="#crestPath"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle class="sparkle" r="1.2">
    <animateMotion dur="8s" repeatCount="indefinite" begin="-5s"><mpath href="#crestPath"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" repeatCount="indefinite"/>
  </circle>

  <rect x="0" y="100" width="800" height="20" fill="#2D1B4E"/>
</svg>
