<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9B8AAC"/>
      <stop offset="50%"  stop-color="#7BA3C9"/>
      <stop offset="100%" stop-color="#E8B4C8"/>
    </linearGradient>
    <linearGradient id="snakeG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8B4C8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#E8B4C8"/>
      <stop offset="100%" stop-color="#E8B4C8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <path id="dust1" d="M0,0 C10,-15 -20,-25 15,-45 C-5,-55 20,-70 0,-90"/>
    <path id="dust2" d="M0,0 C-12,-18 18,-30 -10,-50 C8,-60 -15,-75 0,-95"/>
    <path id="dust3" d="M0,0 C15,-10 -10,-35 20,-55 C-8,-65 5,-80 0,-92"/>

    <clipPath id="bootSweep">
      <rect x="0" y="0" width="800" height="0">
        <animate attributeName="height" from="0" to="200" dur="0.35s" begin="0s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    .bg { fill: url(#bgG); }
    .border-glow { fill: none; stroke: url(#borderG); stroke-width: 2; opacity: 0.6; }

    .snake {
      fill: none;
      stroke: url(#snakeG);
      stroke-width: 2;
      stroke-dasharray: 120 1900;
      animation: snakeRun 8s linear infinite;
    }
    @keyframes snakeRun { to { stroke-dashoffset: -2020; } }

    .prompt  { font-family: 'JetBrains Mono','Consolas',monospace; font-size: 16px; fill: #9B8AAC; filter: url(#glow); }
    .command { font-family: 'JetBrains Mono','Consolas',monospace; font-size: 16px; fill: #3FB950; filter: url(#glow); }
    .output  { font-family: 'JetBrains Mono','Consolas',monospace; font-size: 14px; fill: #7BA3C9; }
    .highlight { fill: #E8B4C8; }

    .line1, .line2, .line3, .line4 { clip-path: inset(0 100% 0 0); }
    .line1 { animation: typeA 2.2s cubic-bezier(0.45, 0, 0.55, 1) 0.5s forwards; }
    .line2 { animation: typeB 1.6s cubic-bezier(0.45, 0, 0.55, 1) 3s forwards; }
    .line3 { animation: typeC 2s   cubic-bezier(0.45, 0, 0.55, 1) 5s forwards; }
    .line4 { animation: typeD 1.8s cubic-bezier(0.45, 0, 0.55, 1) 7.2s forwards; }

    @keyframes typeA {
      0%   { clip-path: inset(0 100% 0 0); }
      8%   { clip-path: inset(0 90% 0 0); }
      18%  { clip-path: inset(0 82% 0 0); }
      22%  { clip-path: inset(0 82% 0 0); }
      35%  { clip-path: inset(0 65% 0 0); }
      50%  { clip-path: inset(0 45% 0 0); }
      54%  { clip-path: inset(0 45% 0 0); }
      72%  { clip-path: inset(0 20% 0 0); }
      90%  { clip-path: inset(0 5% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes typeB {
      0%   { clip-path: inset(0 100% 0 0); }
      10%  { clip-path: inset(0 85% 0 0); }
      30%  { clip-path: inset(0 60% 0 0); }
      55%  { clip-path: inset(0 35% 0 0); }
      80%  { clip-path: inset(0 10% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes typeC {
      0%   { clip-path: inset(0 100% 0 0); }
      12%  { clip-path: inset(0 88% 0 0); }
      25%  { clip-path: inset(0 72% 0 0); }
      45%  { clip-path: inset(0 50% 0 0); }
      65%  { clip-path: inset(0 30% 0 0); }
      85%  { clip-path: inset(0 10% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes typeD {
      0%   { clip-path: inset(0 100% 0 0); }
      15%  { clip-path: inset(0 82% 0 0); }
      30%  { clip-path: inset(0 65% 0 0); }
      50%  { clip-path: inset(0 45% 0 0); }
      70%  { clip-path: inset(0 25% 0 0); }
      90%  { clip-path: inset(0 5% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }

    .cursor {
      fill: #3FB950;
      filter: url(#glow);
      animation: cursorBreathe 1.4s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }
    @keyframes cursorBreathe {
      0%, 100% { opacity: 0.25; }
      50%      { opacity: 1; }
    }

    .btn-close { fill: #ff5f56; }
    .btn-min   { fill: #ffbd2e; }
    .btn-max   { fill: #27c93f; }

    .particle { fill: #9B8AAC; }

    .boot-flicker {
      fill: #E8B4C8;
      opacity: 0;
      animation: flicker 0.5s ease-out 0.35s forwards;
    }
    @keyframes flicker {
      0%   { opacity: 0; }
      30%  { opacity: 0.25; }
      45%  { opacity: 0.08; }
      65%  { opacity: 0.18; }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .line1, .line2, .line3, .line4 { clip-path: inset(0 0 0 0) !important; }
      .cursor { opacity: 1 !important; }
      .boot-flicker, .snake, .particle { opacity: 0 !important; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="800" height="200" rx="12"/>
  <rect class="border-glow" x="1" y="1" width="798" height="198" rx="12"/>

  <g clip-path="url(#bootSweep)">
    <rect class="snake" x="2" y="2" width="796" height="196" rx="12"/>
    <rect class="boot-flicker" x="0" y="0" width="800" height="200" rx="12"/>

    <g>
      <circle class="btn-close" cx="25" cy="18" r="6"/>
      <circle class="btn-min"   cx="45" cy="18" r="6"/>
      <circle class="btn-max"   cx="65" cy="18" r="6"/>
      <text x="400" y="22" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6e7681">void@arch: ~/projects</text>
    </g>
    <line x1="15" y1="35" x2="785" y2="35" stroke="#30363d" stroke-width="1"/>

    <g transform="translate(720, 170)">
      <circle class="particle" r="2" opacity="0.4">
        <animateMotion dur="12s" repeatCount="indefinite" begin="0s"><mpath href="#dust1"/></animateMotion>
        <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.15;0.85;1" dur="12s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(750, 180)">
      <circle class="particle" r="1.5" opacity="0.4">
        <animateMotion dur="14s" repeatCount="indefinite" begin="-4s"><mpath href="#dust2"/></animateMotion>
        <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.15;0.85;1" dur="14s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(770, 190)">
      <circle class="particle" r="1" opacity="0.4">
        <animateMotion dur="10s" repeatCount="indefinite" begin="-7s"><mpath href="#dust3"/></animateMotion>
        <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.15;0.85;1" dur="10s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(740, 175)">
      <circle class="particle" r="1.5" opacity="0.4">
        <animateMotion dur="13s" repeatCount="indefinite" begin="-2s"><mpath href="#dust1"/></animateMotion>
        <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.15;0.85;1" dur="13s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(25, 60)">
      <g class="line1">
        <text class="prompt" x="0" y="0">void@arch</text>
        <text class="prompt" x="85" y="0" fill="#6e7681">~$</text>
        <text class="command" x="110" y="0">echo "SYSTEM BREACH DETECTED..."</text>
      </g>
      <g class="line2">
        <text class="output" x="0" y="30">SYSTEM BREACH DETECTED...</text>
      </g>
      <g class="line3">
        <text class="prompt" x="0" y="60">void@arch</text>
        <text class="prompt" x="85" y="60" fill="#6e7681">~$</text>
        <text class="command" x="110" y="60">cat /etc/profile</text>
      </g>
      <g class="line4">
        <text class="output" x="0" y="90">USER=</text>
        <text class="output highlight" x="50" y="90">Daniel Fonov</text>
        <text class="output" x="170" y="90">| ROLE=</text>
        <text class="output highlight" x="235" y="90">SysAdmin</text>
        <text class="output" x="320" y="90">| OS=</text>
        <text class="output" x="365" y="90" fill="#1793D1">Arch Linux</text>
      </g>
      <rect class="cursor" x="0" y="110" width="10" height="18" rx="1"/>
      <text class="prompt" x="0" y="125" opacity="0.4">void@arch</text>
      <text class="prompt" x="85" y="125" fill="#6e7681" opacity="0.4">~$</text>
    </g>

    <path d="M780 180 L780 190 L790 190" stroke="#9B8AAC" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M10 190 L10 180 L20 180"    stroke="#9B8AAC" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
</svg>
