<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60">
  <defs>
    <linearGradient id="pg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8B4C8"/>
      <stop offset="100%" stop-color="#f5d5e0"/>
    </linearGradient>
    <linearGradient id="pg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B8AAC"/>
      <stop offset="100%" stop-color="#c4b8d0"/>
    </linearGradient>
    <path id="pS" d="M0,-3 C1,-2 2,0 2,1 C2,2 1,3 0,4 C-1,3 -2,2 -2,1 C-2,0 -1,-2 0,-3 Z"/>
    <path id="pM" d="M0,-5 C1.5,-3 3,0 3,1.5 C3,3 1.5,5 0,6.5 C-1.5,5 -3,3 -3,1.5 C-3,0 -1.5,-3 0,-5 Z"/>
    <path id="pL" d="M0,-7 C2.5,-5 5,0 5,2.5 C5,5 2.5,7 0,9 C-2.5,7 -5,5 -5,2.5 C-5,0 -2.5,-5 0,-7 Z"/>
    <path id="fA" d="M0,-15 C-10,0 12,18 -8,38 C4,52 -2,65 0,80"/>
    <path id="fB" d="M0,-15 C8,5 -10,22 6,42 C-4,55 2,68 0,80"/>
    <path id="fC" d="M0,-15 C-6,8 8,28 -4,50 C2,62 -2,72 0,80"/>
  </defs>

  <style>
    .p {
      animation: spin var(--d, 6s) linear infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back  .p { opacity: 0.4; }
    .mid   .p { opacity: 0.7; }
    .front .p { opacity: 0.95; }

    .dot {
      fill: #E8B4C8;
      animation: breathe 2.4s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.25; transform: scale(0.85); }
      50%      { opacity: 0.9;  transform: scale(1.15); }
    }

    .line { stroke: #9B8AAC; stroke-width: 1; opacity: 0.25; stroke-dasharray: 5 5; }

    @media (prefers-reduced-motion: reduce) {
      .p { animation: none; opacity: 0 !important; }
      .dot { animation: none; opacity: 0.5 !important; }
    }
  </style>

  <line class="line" x1="50" y1="30" x2="750" y2="30"/>

  <circle class="dot" cx="100" cy="30" r="3"   style="animation-delay: 0s"/>
  <circle class="dot" cx="200" cy="30" r="2.5" style="animation-delay: 0.35s"/>
  <circle class="dot" cx="300" cy="30" r="3"   style="animation-delay: 0.7s"/>
  <circle class="dot" cx="400" cy="30" r="2.5" style="animation-delay: 1.05s"/>
  <circle class="dot" cx="500" cy="30" r="3"   style="animation-delay: 1.4s"/>
  <circle class="dot" cx="600" cy="30" r="2.5" style="animation-delay: 1.75s"/>
  <circle class="dot" cx="700" cy="30" r="3"   style="animation-delay: 2.1s"/>

  <g class="back">
    <g transform="translate(100,0)"><g><animateMotion dur="10s"   repeatCount="indefinite" begin="0s"><mpath href="#fA"/></animateMotion><use class="p" style="--d:10s"   href="#pS" fill="url(#pg2)"/></g></g>
    <g transform="translate(220,0)"><g><animateMotion dur="9s"    repeatCount="indefinite" begin="-2s"><mpath href="#fB"/></animateMotion><use class="p" style="--d:9s"    href="#pS" fill="url(#pg1)"/></g></g>
    <g transform="translate(360,0)"><g><animateMotion dur="11s"   repeatCount="indefinite" begin="-4s"><mpath href="#fC"/></animateMotion><use class="p" style="--d:11s"   href="#pS" fill="url(#pg2)"/></g></g>
    <g transform="translate(490,0)"><g><animateMotion dur="9.5s"  repeatCount="indefinite" begin="-1s"><mpath href="#fA"/></animateMotion><use class="p" style="--d:9.5s"  href="#pS" fill="url(#pg1)"/></g></g>
    <g transform="translate(630,0)"><g><animateMotion dur="10.5s" repeatCount="indefinite" begin="-3s"><mpath href="#fB"/></animateMotion><use class="p" style="--d:10.5s" href="#pS" fill="url(#pg2)"/></g></g>
    <g transform="translate(750,0)"><g><animateMotion dur="9s"    repeatCount="indefinite" begin="-5s"><mpath href="#fC"/></animateMotion><use class="p" style="--d:9s"    href="#pS" fill="url(#pg1)"/></g></g>
  </g>

  <g class="mid">
    <g transform="translate(60,0)" ><g><animateMotion dur="6.5s" repeatCount="indefinite" begin="-5s"  ><mpath href="#fA"/></animateMotion><use class="p" style="--d:6.5s" href="#pM" fill="url(#pg2)"/></g></g>
    <g transform="translate(160,0)"><g><animateMotion dur="7s"   repeatCount="indefinite" begin="-0.5s"><mpath href="#fB"/></animateMotion><use class="p" style="--d:7s"   href="#pM" fill="url(#pg1)"/></g></g>
    <g transform="translate(290,0)"><g><animateMotion dur="6.5s" repeatCount="indefinite" begin="-2s"  ><mpath href="#fC"/></animateMotion><use class="p" style="--d:6.5s" href="#pM" fill="url(#pg2)"/></g></g>
    <g transform="translate(430,0)"><g><animateMotion dur="7.5s" repeatCount="indefinite" begin="-4s"  ><mpath href="#fA"/></animateMotion><use class="p" style="--d:7.5s" href="#pM" fill="url(#pg1)"/></g></g>
    <g transform="translate(560,0)"><g><animateMotion dur="6.8s" repeatCount="indefinite" begin="-1.5s"><mpath href="#fB"/></animateMotion><use class="p" style="--d:6.8s" href="#pM" fill="url(#pg2)"/></g></g>
    <g transform="translate(690,0)"><g><animateMotion dur="7.2s" repeatCount="indefinite" begin="-3s"  ><mpath href="#fC"/></animateMotion><use class="p" style="--d:7.2s" href="#pM" fill="url(#pg1)"/></g></g>
  </g>

  <g class="front">
    <g transform="translate(130,0)"><g><animateMotion dur="5s"   repeatCount="indefinite" begin="-1s"  ><mpath href="#fC"/></animateMotion><use class="p" style="--d:5s"   href="#pL" fill="url(#pg1)"/></g></g>
    <g transform="translate(260,0)"><g><animateMotion dur="4.5s" repeatCount="indefinite" begin="-2.5s"><mpath href="#fA"/></animateMotion><use class="p" style="--d:4.5s" href="#pL" fill="url(#pg2)"/></g></g>
    <g transform="translate(400,0)"><g><animateMotion dur="5.5s" repeatCount="indefinite" begin="-0.5s"><mpath href="#fB"/></animateMotion><use class="p" style="--d:5.5s" href="#pL" fill="url(#pg1)"/></g></g>
    <g transform="translate(540,0)"><g><animateMotion dur="5s"   repeatCount="indefinite" begin="-3s"  ><mpath href="#fC"/></animateMotion><use class="p" style="--d:5s"   href="#pL" fill="url(#pg2)"/></g></g>
    <g transform="translate(670,0)"><g><animateMotion dur="4.8s" repeatCount="indefinite" begin="-4s"  ><mpath href="#fA"/></animateMotion><use class="p" style="--d:4.8s" href="#pL" fill="url(#pg1)"/></g></g>
    <g transform="translate(720,0)"><g><animateMotion dur="5.2s" repeatCount="indefinite" begin="-1.8s"><mpath href="#fB"/></animateMotion><use class="p" style="--d:5.2s" href="#pL" fill="url(#pg2)"/></g></g>
  </g>
</svg>
